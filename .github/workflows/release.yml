name: Release Rug

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build with Maven
        run: mvn -B package

      - name: Prepare release jar
        shell: bash
        run: |
          mkdir -p release
          JAR="$(find target -maxdepth 1 -type f -name '*.jar' ! -name '*sources*' ! -name '*javadoc*' | head -n 1)"
          if [ -z "$JAR" ]; then
            echo "No jar found in target/"
            exit 1
          fi
          cp "$JAR" "release/Rug-${GITHUB_REF_NAME}.jar"
          ls -la release

      - name: Detect prerelease
        id: prerelease
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == *alpha* || "$TAG" == *beta* || "$TAG" == *rc* ]]; then
            echo "flag=--prerelease" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" \
            release/*.jar \
            --title "Rug ${GITHUB_REF_NAME}" \
            --notes "Automated Rug release for ${GITHUB_REF_NAME}." \
            ${{ steps.prerelease.outputs.flag }}
